<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - AutoAssist IA</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: #1e293b;
            --card-strong: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --primary: #1e3a8a;
            --primary-dark: #0f172a;
            --danger: #ef4444;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", "Segoe UI", sans-serif;
            min-height: 100vh;
            background: radial-gradient(1200px 600px at 15% 10%, #1e293b 0%, transparent 60%),
                        linear-gradient(180deg, var(--bg-1), var(--bg-2));
            color: var(--text);
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 28px;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .nav-logo {
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 16px;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .nav-link:hover {
            opacity: 1;
        }

        .btn {
            border: 1px solid var(--white);
            background: transparent;
            color: var(--white);
            padding: 10px 18px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
            background: var(--white);
            color: var(--primary-dark);
        }

        .profile-container {
            max-width: 680px;
            margin: 40px auto 60px;
            padding: 0 20px;
        }

        .profile-card {
            background: var(--card);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .profile-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--white);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            text-transform: uppercase;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 700;
        }

        .profile-email {
            color: var(--text-muted);
            font-size: 13px;
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            text-transform: none;
            border: none;
        }

        .fields {
            display: grid;
            gap: 14px;
            margin-top: 16px;
        }

        .field-card {
            background: var(--card-strong);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .field-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-field {
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            outline: none;
            width: 100%;
        }

        .field-value {
            font-size: 14px;
            font-weight: 600;
        }

        .actions {
            margin-top: 18px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
            width: 100%;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            text-transform: none;
            border: none;
        }

        .btn-primary:hover {
            background: #1f2d6f;
            color: var(--white);
        }

        @media (max-width: 640px) {
            .profile-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn-danger {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">AutoAssist IA</a>
        <div class="nav-menu">
            <a href="chat.html" class="nav-link">Chat</a>
            <button class="btn" onclick="logout()">Sair</button>
        </div>
    </div>
</nav>

<div class="profile-container">
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-title">
                <div class="profile-avatar" id="profileAvatar">A</div>
                <div>
                    <div class="profile-name" id="profileName">Carregando...</div>
                    <div class="profile-email" id="profileEmail">email@exemplo.com</div>
                </div>
            </div>
            <button class="btn btn-danger" id="btnDelete">Excluir Conta</button>
        </div>

        <div class="fields">
            <div class="field-card">
                <div class="field-label">Nome</div>
                <input type="text" id="infoName" class="input-field" placeholder="Seu nome">
            </div>

            <div class="field-card">
                <div class="field-label">Email</div>
                <input type="email" id="infoEmail" class="input-field" placeholder="seu@email.com">
            </div>

            <div class="field-card">
                <div class="field-label">Status</div>
                <div class="field-value" id="infoStatus">-</div>
            </div>

            <div class="field-card">
                <div class="field-label">Total de Consultas</div>
                <div class="field-value" id="infoConsultas">-</div>
            </div>
        </div>

        <div class="actions">
            <button id="btnSave" class="btn btn-primary">Salvar Alterações</button>
        </div>
    </div>
</div>

<script src="static/js/config.js"></script>
<script src="static/js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        if (!Auth.isAuthenticated()) {
            window.location.href = '/login.html';
            return;
        }

        const headerName = document.getElementById('profileName');
        const headerEmail = document.getElementById('profileEmail');
        const avatar = document.getElementById('profileAvatar');
        const infoName = document.getElementById('infoName');
        const infoEmail = document.getElementById('infoEmail');
        const infoStatus = document.getElementById('infoStatus');
        const infoConsultas = document.getElementById('infoConsultas');
        const btnSave = document.getElementById('btnSave');
        const btnDelete = document.getElementById('btnDelete');

        function updateAvatar(name) {
            const initial = (name || 'A').trim().charAt(0).toUpperCase();
            avatar.textContent = initial || 'A';
        }

        // Carrega dados do Backend
        try {
            const res = await Auth.authenticatedFetch('/api/user');
            if (res.ok) {
                const user = await res.json();

                headerName.textContent = user.nome;
                headerEmail.textContent = user.email;

                infoName.value = user.nome;
                infoEmail.value = user.email;

                updateAvatar(user.nome);

                const isPrem = user.is_premium;
                infoStatus.textContent = isPrem ? 'Premium' : 'Gratuito';
                infoStatus.style.color = isPrem ? '#fbbf24' : '#94a3b8';

                infoConsultas.textContent = user.total_consultas ?? 0;
            } else {
                Auth.logout();
            }
        } catch (e) {
            console.error(e);
        }

        // Salvar (PUT /api/user)
        btnSave.addEventListener('click', async () => {
            const newName = infoName.value.trim();
            const newEmail = infoEmail.value.trim();

            if (!newName || !newEmail) {
                alert('Preencha os campos obrigatórios.');
                return;
            }

            btnSave.disabled = true;
            btnSave.textContent = 'Salvando...';

            try {
                const res = await Auth.authenticatedFetch('/api/user', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: newName, email: newEmail })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('Perfil atualizado!');
                    headerName.textContent = data.nome;
                    headerEmail.textContent = data.email;
                    updateAvatar(data.nome);
                    infoConsultas.textContent = data.total_consultas ?? infoConsultas.textContent;
                } else {
                    alert(data.error || 'Erro ao salvar');
                }
            } catch (e) {
                alert('Erro de conexão');
            } finally {
                btnSave.disabled = false;
                btnSave.textContent = 'Salvar Alterações';
            }
        });

        // Excluir conta (DELETE /api/user)
        btnDelete.addEventListener('click', async () => {
            if (!confirm('Tem certeza que deseja excluir sua conta? Essa ação é irreversível.')) return;

            btnDelete.disabled = true;
            btnDelete.textContent = 'Excluindo...';

            try {
                const res = await Auth.authenticatedFetch('/api/user', { method: 'DELETE' });
                const data = await res.json();

                if (res.ok) {
                    alert('Conta excluída com sucesso.');
                    Auth.logout();
                } else {
                    alert(data.error || 'Erro ao excluir conta');
                }
            } catch (e) {
                alert('Erro de conexão');
            } finally {
                btnDelete.disabled = false;
                btnDelete.textContent = 'Excluir Conta';
            }
        });
    });

    // Logout Global
    function logout() {
        if (confirm('Tem certeza?')) Auth.logout();
    }
</script>

</body>
</html>
